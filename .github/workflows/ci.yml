name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  backend-test:
    name: Backend Tests (Java 17)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      contains(toJson(github.event.commits.*.modified), 'backend/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw test
        working-directory: backend

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  frontend-check:
    name: Frontend Lint & Build (Node 20)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      contains(toJson(github.event.commits.*.modified), 'frontend/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://placeholder.example.com
          VITE_WS_URL: https://placeholder.example.com

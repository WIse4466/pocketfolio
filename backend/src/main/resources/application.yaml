spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/pocketfolio
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: your-super-secret-key-change-this-in-production-at-least-256-bits-long
  expiration: 86400000 # 24 小時（單位：毫秒）
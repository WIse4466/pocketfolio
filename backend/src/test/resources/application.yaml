spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pocketfolio
    username: admin
    password: password

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-at-least-256-bits-long-for-hmac-sha-algorithm-ok
  expiration: 86400000

api:
  coingecko:
    base-url: https://api.coingecko.com/api/v3
  yahoo-finance:
    base-url: https://query1.finance.yahoo.com/v8/finance/chart

# 停用定時任務，避免 @EventListener 在 @SpringBootTest 期間呼叫外部 API
spring.task.scheduling.pool.size: 0
scheduling:
  enabled: false
